name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

env:
  PAGES_PROJECT: resume
  PAGES_DOMAIN: resume.mfaherty.net

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Create Cloudflare Pages project
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          command: pages project create ${{ env.PAGES_PROJECT }} --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          command: pages deploy resume --project-name=${{ env.PAGES_PROJECT }}

      - name: Register custom domain
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          command: pages domain add ${{ env.PAGES_DOMAIN }} --project-name=${{ env.PAGES_PROJECT }}
        continue-on-error: true
