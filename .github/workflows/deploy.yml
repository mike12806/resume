name: Deploy to Cloudflare Pages

on:
  workflow_dispatch: 
  push:
    branches: [main]

env:
  PAGES_PROJECT: resume
  WRANGLER_VERSION: "3.90.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Create Cloudflare Pages project
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          command: pages project create ${{ env.PAGES_PROJECT }} --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          command: pages deploy resume --project-name=${{ env.PAGES_PROJECT }} --commit-dirty=true

      - name: Register custom domain
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          command: pages domain add resume.mfaherty.net --project-name=${{ env.PAGES_PROJECT }}
        continue-on-error: true
