name: Deploy to Cloudflare Pages

on:
  workflow_dispatch: 
  push:
    branches: [main]

env:
  PAGES_PROJECT: resume
  WRANGLER_VERSION: "3.90.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Create Cloudflare Pages project
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          command: pages project create ${{ env.PAGES_PROJECT }} --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          command: pages deploy resume --project-name=${{ env.PAGES_PROJECT }} --commit-dirty=true

      - name: Register custom domain
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/${{ env.PAGES_PROJECT }}/domains" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name": "resume.mfaherty.net"}')
          echo "Response: $RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // "false"' 2>/dev/null)
          if [ "$SUCCESS" != "true" ]; then
            CODE=$(echo "$RESPONSE" | jq -r '.errors[0].code // ""' 2>/dev/null)
            MESSAGE=$(echo "$RESPONSE" | jq -r '.errors[0].message // "Unknown error"' 2>/dev/null)
            if [[ "$CODE" == "8000003" ]] || [[ "$MESSAGE" == *"already"* ]]; then
              echo "Domain already registered"
            else
              echo "Error ($CODE): $MESSAGE"
              exit 1
            fi
          else
            echo "Domain registered successfully"
          fi
        continue-on-error: true

      - name: Configure DNS CNAME for custom domain
        run: |
          # Read the actual pages.dev subdomain from the Pages project
          PROJECT_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/${{ env.PAGES_PROJECT }}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          PAGES_DOMAIN=$(echo "$PROJECT_RESPONSE" | jq -r '.result.subdomain // ""')
          if [ -z "$PAGES_DOMAIN" ]; then
            echo "Could not read pages.dev subdomain from API, falling back to default"
            PAGES_DOMAIN="${{ env.PAGES_PROJECT }}.pages.dev"
          fi
          echo "Pages domain: $PAGES_DOMAIN"

          # Look up the zone ID for mfaherty.net
          ZONE_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones?name=mfaherty.net" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          ZONE_ID=$(echo "$ZONE_RESPONSE" | jq -r '.result[0].id // ""')
          if [ -z "$ZONE_ID" ]; then
            echo "Failed to get zone ID for mfaherty.net"
            exit 1
          fi
          echo "Zone ID: $ZONE_ID"

          # Check whether a CNAME record already exists for resume.mfaherty.net
          RECORDS_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=resume.mfaherty.net" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          RECORD_ID=$(echo "$RECORDS_RESPONSE" | jq -r '.result[0].id // ""')

          if [ -n "$RECORD_ID" ]; then
            echo "Updating existing CNAME record $RECORD_ID..."
            RESULT=$(curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"CNAME\",\"name\":\"resume\",\"content\":\"$PAGES_DOMAIN\",\"proxied\":true}")
          else
            echo "Creating new CNAME record..."
            RESULT=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"CNAME\",\"name\":\"resume\",\"content\":\"$PAGES_DOMAIN\",\"proxied\":true}")
          fi

          SUCCESS=$(echo "$RESULT" | jq -r '.success // "false"')
          if [ "$SUCCESS" != "true" ]; then
            echo "Error configuring DNS record: $(echo "$RESULT" | jq -r '.errors')"
            exit 1
          fi
          echo "DNS CNAME configured: resume.mfaherty.net -> $PAGES_DOMAIN"

      - name: Verify custom domain
        run: |
          PATCH_RESPONSE=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/${{ env.PAGES_PROJECT }}/domains/resume.mfaherty.net" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Verify response: $PATCH_RESPONSE"
          SUCCESS=$(echo "$PATCH_RESPONSE" | jq -r '.success // "false"' 2>/dev/null)
          if [ "$SUCCESS" != "true" ]; then
            echo "Warning: domain verification trigger may not have succeeded: $(echo "$PATCH_RESPONSE" | jq -c '.errors // []')"
          else
            STATUS=$(echo "$PATCH_RESPONSE" | jq -r '.result.status // "unknown"' 2>/dev/null)
            echo "Domain verification initiated, status: $STATUS"
          fi

      - name: Purge Cloudflare cache for resume.mfaherty.net
        run: |
          ZONE_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones?name=mfaherty.net" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          ZONE_ID=$(echo "$ZONE_RESPONSE" | jq -r '.result[0].id // ""')
          if [ -z "$ZONE_ID" ]; then
            echo "Failed to get zone ID for mfaherty.net"
            exit 1
          fi
          echo "Zone ID: $ZONE_ID"
          PURGE_RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"hosts": ["resume.mfaherty.net"]}')
          echo "Purge response: $PURGE_RESPONSE"
          SUCCESS=$(echo "$PURGE_RESPONSE" | jq -r '.success // "false"' 2>/dev/null)
          if [ "$SUCCESS" != "true" ]; then
            echo "Failed to purge Cloudflare cache for resume.mfaherty.net: $(echo "$PURGE_RESPONSE" | jq -c '.errors // []')"
            exit 1
          fi
          echo "Cache purged successfully for resume.mfaherty.net"
